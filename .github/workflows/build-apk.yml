name: Build APK (Preview)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Verify EAS auth
        run: eas whoami

      - name: Build APK via EAS
        run: eas build --platform android --profile preview --non-interactive --no-wait

      - name: APK download link
        run: echo "Build submitted! Download from https://expo.dev/accounts/mehdirashid/projects/mobile/builds"
